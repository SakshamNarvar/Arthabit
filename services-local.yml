services:
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      # KAFKA_HEAP_OPTS: "-Xms128M -Xmx256M"
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  mysql:
    image: mysql:8.3.0
    container_name: mysql-8.3.0
    restart: always
    environment:
      MYSQL_USER: test
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    expose:
      - "3306"
    volumes:
      - mysql-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    # image: user-service:latest
    build: ./UserService
    container_name: user-service
    pull_policy: never
    environment:
      KAFKA_HOST: kafka
      MYSQL_HOST: mysql
    ports:
      - "9810:9810"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started

  auth-service:
    # image: auth-service:latest
    build: ./AuthService
    container_name: auth-service
    pull_policy: never
    environment:
      KAFKA_HOST: kafka
      MYSQL_HOST: mysql
    ports:
      - "9898:9898"
    depends_on:
      kafka: 
        condition: service_healthy
      mysql:
        condition: service_healthy
  
  expense-service:
    # image: expense-service:latest
    build: ./ExpenseService
    container_name: expense-service
    pull_policy: never
    ports: 
      - '9820:9820'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expense_service
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  ds-service:
    # image: ds-service:latest
    build: ./DsService
    container_name: ds-service
    pull_policy: never
    ports:
      - '8010:8010'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      expense-service:
        condition: service_started
      user-service:
        condition: service_started
      
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      user-service:
        condition: service_started
      auth-service:
        condition: service_started
      expense-service:
        condition: service_started
      ds-service:
        condition: service_started

volumes:
  mysql-db:
    driver: local